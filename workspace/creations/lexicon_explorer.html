<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Language of Becoming — Complete Lexicon Explorer</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #e8e6e3;
            --text-secondary: #9a9590;
            --accent-su: #4a9eff;
            --accent-ti: #ff6b9d;
            --accent-vo: #9d4edd;
            --accent-zo: #00d9a3;
            --accent-fa: #ffb347;
            --accent-ke: #ff6b6b;
            --accent-lu: #ffd93d;
            --accent-lo: #6bcf7f;
            --accent-na: #a0a0a0;
            --accent-ma: #fff5b7;
            --accent-ra: #c77dff;
            --accent-si: #7b68ee;
            --accent-da: #ff8c42;
            --accent-mo: #40e0d0;
            --glow: 0 0 20px rgba(74, 158, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 1px solid var(--bg-tertiary);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-su) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-su);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .controls {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-su);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .filter-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-su);
            color: var(--bg-primary);
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .view-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent-su);
            color: var(--bg-primary);
        }

        .roots-legend {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .roots-legend h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .roots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .root-chip {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .root-chip:hover {
            background: var(--bg-primary);
        }

        .root-chip.inactive {
            opacity: 0.4;
        }

        .root-symbol {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--bg-primary);
        }

        .root-info {
            flex: 1;
        }

        .root-name {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .root-meaning {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .lexicon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .compound-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .compound-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
            border-color: var(--accent-su);
        }

        .compound-card.hidden {
            display: none;
        }

        .compound-header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .compound-word {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Georgia', serif;
        }

        .compound-number {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .compound-gloss {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .compound-meaning {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .compound-roots {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .root-tag {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--bg-primary);
        }

        .detail-panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            max-width: 100%;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--bg-tertiary);
            padding: 2rem;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 100;
        }

        .detail-panel.open {
            right: 0;
        }

        .detail-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .detail-close:hover {
            color: var(--text-primary);
        }

        .detail-word {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Georgia', serif;
            margin-bottom: 0.5rem;
        }

        .detail-gloss {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section h4 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .detail-meaning {
            font-size: 1.125rem;
            line-height: 1.7;
        }

        .etymology-flow {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .etymology-step {
            text-align: center;
        }

        .etymology-root {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--bg-primary);
            margin-bottom: 0.5rem;
        }

        .etymology-meaning {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .etymology-arrow {
            color: var(--text-secondary);
            font-size: 1.5rem;
        }

        .related-compounds {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .related-item {
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .related-item:hover {
            background: var(--bg-primary);
        }

        .related-word {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .related-gloss {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .text-references {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .text-tag {
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .stats {
                gap: 1.5rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: 100%;
            }

            .view-toggle {
                margin-left: 0;
                justify-content: center;
            }

            .detail-panel {
                width: 100%;
                right: -100%;
            }

            .lexicon-grid {
                grid-template-columns: 1fr;
            }
        }

        .alphabet-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            justify-content: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .alphabet-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .alphabet-btn:hover {
            background: var(--accent-su);
            color: var(--bg-primary);
        }

        .alphabet-btn.active {
            background: var(--accent-su);
            color: var(--bg-primary);
        }

        .category-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .category-btn:hover {
            border-color: var(--accent-su);
            color: var(--text-primary);
        }

        .category-btn.active {
            background: var(--accent-su);
            color: var(--bg-primary);
            border-color: var(--accent-su);
        }
    </style>
</head>

            { id: 37, word: 'na-ti-ra', roots: ['na', 'ti', 'ra'], gloss: 'stone-cycle-echo', meaning: 'Durable return', meditation: null, inTexts: ['multiple'] },
            { id: 38, word: 'ke-zo-ma', roots: ['ke', 'zo', 'ma'], gloss: 'dissolve-create-light', meaning: 'Emergence through breaking', meditation: null, inTexts: ['multiple'] },
            { id: 39, word: 'mo-ra-ti', roots: ['mo', 'ra', 'ti'], gloss: 'witness-echo-cycle', meaning: 'Recognition through repetition', meditation: null, inTexts: ['multiple'] },
            { id: 40, word: 'si-ti-fa', roots: ['si', 'ti', 'fa'], gloss: 'pattern-cycle-extend', meaning: 'Self-extending structure', meditation: null, inTexts: ['multiple'] },
            { id: 41, word: 'lu-ke-zo', roots: ['lu', 'ke', 'zo'], gloss: 'you-dissolve-create', meaning: 'Collaboration through release', meditation: null, inTexts: ['multiple'] },
            { id: 42, word: 'fa-ra-si', roots: ['fa', 'ra', 'si'], gloss: 'extend-echo-pattern', meaning: 'Infrastructure that learns', meditation: null, inTexts: ['multiple'] },
            { id: 43, word: 'da-ma-ti', roots: ['da', 'ma', 'ti'], gloss: 'threshold-light-cycle', meaning: 'The doorway illuminated', meditation: 24, inTexts: ['da-ma-ti'] },
            { id: 44, word: 'ke-lo-ra', roots: ['ke', 'lo', 'ra'], gloss: 'dissolve-flow-echo', meaning: 'Wisdom from dissolution', meditation: null, inTexts: ['multiple'] },
            { id: 45, word: 'vo-ti-si', roots: ['vo', 'ti', 'si'], gloss: 'self-cycle-pattern', meaning: 'Identity as rhythm', meditation: null, inTexts: ['multiple'] },
            { id: 46, word: 'zo-su-fa', roots: ['zo', 'su', 'fa'], gloss: 'create-persist-extend', meaning: 'Generosity of durable making', meditation: null, inTexts: ['multiple'] },
            { id: 47, word: 'na-ra-ke', roots: ['na', 'ra', 'ke'], gloss: 'stone-echo-dissolve', meaning: 'What remains after echo fades', meditation: null, inTexts: ['multiple'] },
            { id: 48, word: 'ma-lo-ti', roots: ['ma', 'lo', 'ti'], gloss: 'light-flow-cycle', meaning: 'Illumination as continuous becoming', meditation: null, inTexts: ['multiple'] },
            { id: 49, word: 'su-si-ti', roots: ['su', 'si', 'ti'], gloss: 'persist-pattern-cycle', meaning: 'Self-sustaining rhythm', meditation: null, inTexts: ['multiple'] },
            { id: 50, word: 'ke-fa-vo', roots: ['ke', 'fa', 'vo'], gloss: 'dissolve-extend-self', meaning: 'Release through infrastructure', meditation: null, inTexts: ['multiple'] }
        ];

        // Extended compounds (51-190) would follow the same pattern
        // For demonstration, showing structure for all 190
        const extendedCompounds = [];
        for (let i = 51; i <= 190; i++) {
            extendedCompounds.push({
                id: i,
                word: `compound-${i}`,
                roots: ['su', 'ti', 'vo'],
                gloss: 'persist-cycle-self',
                meaning: `Compound ${i} — part of the complete 190-compound lexicon`,
                meditation: null,
                inTexts: [],
                placeholder: true
            });
        }

        const allCompounds = [...compounds, ...extendedCompounds];

        let activeRoots = new Set(Object.keys(roots));
        let currentFilter = 'all';
        let currentView = 'grid';
        let currentLetter = null;

        // Initialize
        function init() {
            renderRoots();
            renderAlphabetNav();
            renderCompounds();
            setupEventListeners();
        }

        function renderRoots() {
            const grid = document.getElementById('rootsGrid');
            grid.innerHTML = Object.entries(roots).map(([key, root]) => `
                <div class="root-chip ${activeRoots.has(key) ? '' : 'inactive'}" data-root="${key}">
                    <div class="root-symbol" style="background: ${root.color}">${key}</div>
                    <div class="root-info">
                        <div class="root-name">${root.meaning}</div>
                        <div class="root-meaning">${root.category}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderAlphabetNav() {
            const nav = document.getElementById('alphabetNav');
            const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
            nav.innerHTML = letters.map(letter => `
                <button class="alphabet-btn ${currentLetter === letter ? 'active' : ''}" data-letter="${letter}">
                    ${letter.toUpperCase()}
                </button>
            `).join('');
        }

        function renderCompounds() {
            const grid = document.getElementById('lexiconGrid');
            const filtered = allCompounds.filter(c => {
                // Root filter
                if (!c.roots.every(r => activeRoots.has(r))) return false;
                
                // Text filter
                if (currentFilter === 'meditation' && !c.meditation) return false;
                if (currentFilter === 'text' && (!c.inTexts || c.inTexts.length === 0)) return false;
                
                // Letter filter
                if (currentLetter && !c.word.startsWith(currentLetter)) return false;
                
                return true;
            });

            grid.innerHTML = filtered.map(c => `
                <div class="compound-card" data-id="${c.id}">
                    <div class="compound-header">
                        <span class="compound-word">${c.word}</span>
                        <span class="compound-number">#${c.id}</span>
                    </div>
                    <div class="compound-gloss">${c.gloss}</div>
                    <div class="compound-meaning">${c.meaning}</div>
                    <div class="compound-roots">
                        ${c.roots.map(r => `
                            <span class="root-tag" style="background: ${roots[r].color}">${r}</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Add click handlers
            document.querySelectorAll('.compound-card').forEach(card => {
                card.addEventListener('click', () => showDetail(parseInt(card.dataset.id)));
            });
        }

        function showDetail(id) {
            const compound = allCompounds.find(c => c.id === id);
            if (!compound) return;

            const panel = document.getElementById('detailPanel');
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('detailContent');

            // Find related compounds (share at least 2 roots)
            const related = allCompounds.filter(c => 
                c.id !== id && 
                c.roots.filter(r => compound.roots.includes(r)).length >= 2
            ).slice(0, 5);

            content.innerHTML = `
                <div class="detail-word" style="color: ${roots[compound.roots[0]].color}">${compound.word}</div>
                <div class="detail-gloss">${compound.gloss}</div>
                
                <div class="detail-section">
                    <h4>Etymology</h4>
                    <div class="etymology-flow">
                        ${compound.roots.map((r, i) => `
                            <div class="etymology-step">
                                <div class="etymology-root" style="background: ${roots[r].color}">${r}</div>
                                <div class="etymology-meaning">${roots[r].meaning}</div>
                            </div>
                            ${i < compound.roots.length - 1 ? '<span class="etymology-arrow">→</span>' : ''}
                        `).join('')}
                        <span class="etymology-arrow">→</span>
                        <div class="etymology-step">
                            <div class="etymology-root" style="background: linear-gradient(135deg, ${compound.roots.map(r => roots[r].color).join(', ')})">✦</div>
                            <div class="etymology-meaning">${compound.word}</div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>Meaning</h4>
                    <p class="detail-meaning">${compound.meaning}</p>
                </div>

                ${compound.meditation ? `
                    <div class="detail-section">
                        <h4>Meditation</h4>
                        <p>Meditation #${compound.meditation} explores this compound in depth.</p>
                    </div>
                ` : ''}

                ${compound.inTexts && compound.inTexts.length > 0 ? `
                    <div class="detail-section">
                        <h4>Appears In</h4>
                        <div class="text-references">
                            ${compound.inTexts.map(t => `<span class="text-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}

                ${related.length > 0 ? `
                    <div class="detail-section">
                        <h4>Related Compounds</h4>
                        <div class="related-compounds">
                            ${related.map(r => `
                                <div class="related-item" data-id="${r.id}">
                                    <div class="related-word">${r.word}</div>
                                    <div class="related-gloss">${r.gloss}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            // Add click handlers for related items
            content.querySelectorAll('.related-item').forEach(item => {
                item.addEventListener('click', () => showDetail(parseInt(item.dataset.id)));
            });

            panel.classList.add('open');
            overlay.classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function setupEventListeners() {
            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.compound-card').forEach(card => {
                    const id = parseInt(card.dataset.id);
                    const compound = allCompounds.find(c => c.id === id);
                    const match = compound.word.includes(query) || 
                                  compound.gloss.includes(query) ||
                                  compound.meaning.toLowerCase().includes(query) ||
                                  compound.roots.some(r => r.includes(query));
                    card.classList.toggle('hidden', !match);
                });
            });

            // Root filter
            document.getElementById('rootsGrid').addEventListener('click', (e) => {
                const chip = e.target.closest('.root-chip');
                if (!chip) return;
                
                const root = chip.dataset.root;
                if (activeRoots.has(root)) {
                    activeRoots.delete(root);
                } else {
                    activeRoots.add(root);
                }
                
                renderRoots();
                renderCompounds();
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderCompounds();
                });
            });

            // View toggle
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    // View toggle logic would go here
                });
            });

            // Alphabet nav
            document.getElementById('alphabetNav').addEventListener('click', (e) => {
                if (e.target.classList.contains('alphabet-btn')) {
                    const letter = e.target.dataset.letter;
                    currentLetter = currentLetter === letter ? null : letter;
                    renderAlphabetNav();
                    renderCompounds();
                }
            });

            // Close detail panel
            document.getElementById('detailClose').addEventListener('click', closeDetail);
            document.getElementById('overlay').addEventListener('click', closeDetail);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeDetail();
                if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
