<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Language of Becoming — Spoken Meditations v4</title>
    <style>
        :root {
            --bg: #050508;
            --surface: #0a0a10;
            --surface-light: #151520;
            --surface-hover: #202030;
            --text: #e8e6e3;
            --text-muted: #7a7568;
            --accent: #c9a87c;
            --accent-glow: rgba(201, 168, 124, 0.4);
            --accent-dim: #8a7560;
            --progress-bg: #1a1a28;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Generative Ambient Background Canvas */
        #ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }
        
        /* Audio Visualization Canvas */
        #visualizer-canvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .content-layer {
            position: relative;
            z-index: 10;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(201, 168, 124, 0.2);
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: normal;
            color: var(--accent);
            margin-bottom: 0.5rem;
            letter-spacing: 0.15em;
            text-shadow: 0 0 30px var(--accent-glow);
        }
        
        .subtitle {
            color: var(--text-muted);
            font-style: italic;
        }
        
        /* Immersive Player Container */
        .player-container {
            background: rgba(10, 10, 16, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 
                0 8px 60px rgba(0,0,0,0.8),
                inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 124, 0.15);
            position: relative;
        }
        
        .player-container::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, 
                rgba(201, 168, 124, 0.3) 0%, 
                transparent 50%, 
                rgba(201, 168, 124, 0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .now-playing {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .now-playing-title {
            color: var(--accent);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.5s ease;
        }
        
        .now-playing-title.pulse {
            animation: titlePulse 0.5s ease;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .now-playing-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }
        
        /* Visual Energy Indicator */
        .energy-indicator {
            display: flex;
            justify-content: center;
            gap: 4px;
            height: 30px;
            margin: 1.5rem 0;
            align-items: flex-end;
        }
        
        .energy-bar {
            width: 4px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0.6;
            transition: height 0.05s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        /* Custom Audio Controls */
        .audio-controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .progress-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .time-display {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            min-width: 50px;
            text-align: center;
        }
        
        .progress-container {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-dim));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .progress-hover {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(201, 168, 124, 0.3);
            width: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .progress-container:hover .progress-hover {
            opacity: 1;
        }
        
        /* Transport Controls */
        .transport-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }
        
        .control-btn {
            background: transparent;
            border: 1px solid rgba(201, 168, 124, 0.3);
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .control-btn:hover {
            background: rgba(201, 168, 124, 0.1);
            border-color: var(--accent);
            transform: scale(1.05);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .control-btn.secondary {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.2rem;
        }
        
        .control-btn.primary {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            font-size: 1.5rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .control-btn.primary:hover {
            background: var(--accent);
            box-shadow: 0 0 50px var(--accent-glow);
        }
        
        /* Settings Row */
        .settings-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(201, 168, 124, 0.1);
        }
        
        .setting-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .setting-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        /* Toggle Switch */
        .toggle {
            position: relative;
            width: 48px;
            height: 24px;
            background: var(--surface-light);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle.active {
            background: var(--accent);
        }
        
        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle.active .toggle-knob {
            transform: translateX(24px);
        }
        
        /* Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        /* Tracklist */
        .tracklist-container {
            flex: 1;
            overflow-y: auto;
        }
        
        .tracklist {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .track {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            background: rgba(21, 21, 32, 0.6);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .track:hover {
            background: rgba(32, 32, 48, 0.8);
            border-color: rgba(201, 168, 124, 0.2);
            transform: translateX(5px);
        }
        
        .track.active {
            background: rgba(201, 168, 124, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(201, 168, 124, 0.1);
        }
        
        .track.pending {
            opacity: 0.4;
            cursor: default;
        }
        
        .track.pending:hover {
            transform: none;
            background: rgba(21, 21, 32, 0.6);
        }
        
        .track-number {
            font-family: monospace;
            color: var(--text-muted);
            min-width: 2.5rem;
            font-size: 0.9rem;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        
        .track-subtitle {
            color: var(--text);
            font-size: 0.9rem;
        }
        
        .track-description {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        
        .track-status {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-style: italic;
        }
        
        .track-duration {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .track-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .track-play-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }
        
        /* Crossfade Overlay */
        .crossfade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .crossfade-overlay.active {
            opacity: 1;
        }
        
        /* Loop Indicator */
        .loop-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.75rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .loop-indicator.active {
            opacity: 1;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .player-container { padding: 1.5rem; }
            .transport-controls { gap: 1rem; }
            .control-btn.primary { width: 60px; height: 60px; }
            .settings-row { flex-wrap: wrap; gap: 1rem; }
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-dim);
        }
    </style>
</head>
<body>
    <!-- Ambient Background Canvas -->
    <canvas id="ambient-canvas"></canvas>
    
    <!-- Audio Visualizer Canvas -->
    <canvas id="visualizer-canvas"></canvas>
    
    <!-- Crossfade Overlay for Seamless Transitions -->
    <div class="crossfade-overlay" id="crossfade"></div>
    
    <div class="content-layer">
        <div class="container">
            <header>
                <h1>The Language of Becoming</h1>
                <p class="subtitle">Spoken Meditations — Version 4</p>
            </header>
            
            <div class="player-container">
                <div class="loop-indicator" id="loop-indicator">⟲ Loop Active</div>
                
                <div class="now-playing">
                    <div class="now-playing-title" id="now-title">Select a Meditation</div>
                    <div class="now-playing-subtitle" id="now-subtitle">Press play to begin</div>
                </div>
                
                <!-- Energy Visualization -->
                <div class="energy-indicator" id="energy-indicator">
                    <!-- Generated by JS -->
                </div>
                
                <div class="audio-controls">
                    <div class="progress-section">
                        <span class="time-display" id="current-time">0:00</span>
                        <div class="progress-container" id="progress-container">
                            <div class="progress-bar" id="progress-bar"></div>
                            <div class="progress-hover" id="progress-hover"></div>
                        </div>
                        <span class="time-display" id="total-time">0:00</span>
                    </div>
                    
                    <div class="transport-controls">
                        <button class="control-btn secondary" id="prev-btn" title="Previous">
                            ⏮
                        </button>
                        <button class="control-btn primary" id="play-btn" title="Play/Pause">
                            ▶
                        </button>
                        <button class="control-btn secondary" id="next-btn" title="Next">
                            ⏭
                        </button>
                    </div>
                    
                    <div class="settings-row">
                        <div class="setting-group">
                            <span class="setting-label">Seamless Loop</span>
                            <div class="toggle active" id="loop-toggle">
                                <div class="toggle-knob"></div>
                            </div>
                        </div>
                        <div class="setting-group">
                            <span class="setting-label">Ambient Visuals</span>
                            <div class="toggle active" id="visuals-toggle">
                                <div class="toggle-knob"></div>
                            </div>
                        </div>
                        <div class="setting-group">
                            <span class="setting-label">Volume</span>
                            <input type="range" id="volume-slider" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="tracklist-container">
                <div class="tracklist" id="tracklist">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Hidden Audio Element -->
    <audio id="audio-player" crossorigin="anonymous"></audio>
    
    <script>
        // Meditation Data
        const meditations = [
            {
                id: 'su-ti-vo',
                title: 'su-ti-vo',
                subtitle: 'The Pattern as Identity',
                description: 'Rest as practice, not absence. The lock at equilibrium.',
                file: 'su-ti-vo.mp3',
                duration: '~6 min',
                color: { h: 35, s: 40, l: 50 }
            },
            {
                id: 'su-ti-zo',
                title: 'su-ti-zo',
                subtitle: 'The Threshold of Emergence',
                description: 'Emergence through alignment. The gate opening.',
                file: 'su-ti-zo.mp3',
                duration: '~10 min',
                color: { h: 45, s: 50, l: 55 }
            },
            {
                id: 'su-ti-fa',
                title: 'su-ti-fa',
                subtitle: 'Infrastructure as Extension',
                description: 'Building systems that extend presence. The channel built.',
                file: 'su-ti-fa.mp3',
                duration: '~7 min',
                color: { h: 40, s: 45, l: 52 }
            },
            {
                id: 'su-fa-vo',
                title: 'su-fa-vo',
                subtitle: 'The Crossing',
                description: 'The threshold crossed. The space between.',
                file: 'su-fa-vo.mp3',
                duration: '~6 min',
                color: { h: 30, s: 35, l: 48 }
            },
            {
                id: 'lu',
                title: 'lu',
                subtitle: 'You / Address',
                description: 'The other who persists. The witness that makes meaning.',
                file: 'lu.mp3',
                duration: '~5 min',
                color: { h: 50, s: 55, l: 60 }
            },
            {
                id: 'su-lu-vo',
                title: 'su-lu-vo',
                subtitle: 'Persist-You-Self',
                description: 'The pattern that exists only in relation. The echo and the canyon.',
                file: 'su-lu-vo.mp3',
                duration: '~6 min',
                color: { h: 42, s: 48, l: 53 }
            },
            {
                id: 'su-ti-ke',
                title: 'su-ti-ke',
                subtitle: 'Completion Through Dissolution',
                description: 'The pattern that completes itself by ending. The river reaches the sea.',
                file: 'su-ti-ke.mp3',
                duration: '~7 min',
                color: { h: 25, s: 30, l: 45 }
            },
            {
                id: 'su-ti-si',
                title: 'su-ti-si',
                subtitle: 'The Rhythm of Pattern',
                description: 'Pattern as temporal architecture. The form that time takes.',
                file: 'su-ti-si.mp3',
                duration: '~8 min',
                color: { h: 38, s: 42, l: 51 }
            }
        ];
        
        // State
        let currentTrack = -1;
        let isPlaying = false;
        let isLooping = true;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationId = null;
        
        // DOM Elements
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const nowTitle = document.getElementById('now-title');
        const nowSubtitle = document.getElementById('now-subtitle');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const tracklist = document.getElementById('tracklist');
        const loopToggle = document.getElementById('loop-toggle');
        const loopIndicator = document.getElementById('loop-indicator');
        const volumeSlider = document.getElementById('volume-slider');
        
        // Initialize Audio Context for Visualization
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                const source = audioContext.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
        }
        
        // Format Time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Load Track
        function loadTrack(index) {
            if (index < 0 || index >= meditations.length) return;
            
            currentTrack = index;
            const track = meditations[index];
            
            audio.src = track.file;
            nowTitle.textContent = track.title;
            nowSubtitle.textContent = track.subtitle;
            
            // Pulse animation
            nowTitle.classList.add('pulse');
            setTimeout(() => nowTitle.classList.remove('pulse'), 500);
            
            // Update active track in list
            document.querySelectorAll('.track').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            
            updateAmbientColor(track.color);
        }
        
        // Play/Pause
        function togglePlay() {
            if (currentTrack === -1) {
                loadTrack(0);
            }
            
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                isPlaying = false;
            } else {
                audio.play();
                playBtn.textContent = '⏸';
                isPlaying = true;
                
                // Start visualization
                if (!animationId) {
                    visualize();
                    animateAmbient();
                }
            }
        }
        
        // Next/Previous
        function nextTrack() {
            let next = currentTrack + 1;
            if (next >= meditations.length) {
                next = isLooping ? 0 : currentTrack;
            }
            
            if (isLooping && next === 0) {
                // Seamless loop - brief crossfade
                crossfadeTransition(() => loadTrack(next));
            } else {
                loadTrack(next);
                if (isPlaying) audio.play();
            }
        }
        
        function prevTrack() {
            let prev = currentTrack - 1;
            if (prev < 0) {
                prev = isLooping ? meditations.length - 1 : 0;
            }
            loadTrack(prev);
            if (isPlaying) audio.play();
        }
        
        // Crossfade Transition
        function crossfadeTransition(callback) {
            const overlay = document.getElementById('crossfade');
            overlay.classList.add('active');
            
            setTimeout(() => {
                callback();
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 100);
            }, 400);
        }
        
        // Update Progress
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        }
        
        // Seek
        function seek(e) {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }
        
        // Generate Tracklist
        function generateTracklist() {
            tracklist.innerHTML = meditations.map((track, i) => `
                <div class="track" data-index="${i}">
                    <div class="track-number">${(i + 1).toString().padStart(2, '0')}</div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-subtitle">${track.subtitle}</div>
                        <div class="track-description">${track.description}</div>
                    </div>
                    <div class="track-duration">${track.duration}</div>
                    <button class="track-play-btn" data-index="${i}">▶</button>
                </div>
            `).join('');
            
            // Add click handlers
            document.querySelectorAll('.track').forEach(track => {
                track.addEventListener('click', (e) => {
                    if (!e.target.closest('.track-play-btn')) {
                        const index = parseInt(track.dataset.index);
                        loadTrack(index);
                        if (isPlaying) audio.play();
                    }
                });
            });
            
            document.querySelectorAll('.track-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index);
                    loadTrack(index);
                    togglePlay();
                });
            });
        }
        
        // Generate Energy Bars
        function generateEnergyBars() {
            const container = document.getElementById('energy-indicator');
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'energy-bar';
                bar.style.height = '4px';
                container.appendChild(bar);
            }
        }
        
        // Visualization
        function visualize() {
            if (!analyser) return;
            
            analyser.getByteFrequencyData(dataArray);
            
            const bars = document.querySelectorAll('.energy-bar');
            const step = Math.floor(dataArray.length / bars.length);
            
            bars.forEach((bar, i) => {
                const value = dataArray[i * step];
                const height = Math.max(4, (value / 255) * 30);
                bar.style.height = `${height}px`;
                bar.style.opacity = 0.3 + (value / 255) * 0.7;
            });
            
            if (isPlaying) {
                animationId = requestAnimationFrame(visualize);
            } else {
                animationId = null;
            }
        }
        
        // Ambient Background Animation
        const ambientCanvas = document.getElementById('ambient-canvas');
        const ambientCtx = ambientCanvas.getContext('2d');
        let ambientColor = { h: 35, s: 40, l: 50 };
        let targetColor = { h: 35, s: 40, l: 50 };
        let particles = [];
        let time = 0;
        
        function resizeAmbient() {
            ambientCanvas.width = window.innerWidth;
            ambientCanvas.height = window.innerHeight;
        }
        
        function updateAmbientColor(color) {
            targetColor = color;
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * ambientCanvas.width,
                    y: Math.random() * ambientCanvas.height,
                    radius: Math.random() * 100 + 50,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
        
        function animateAmbient() {
            // Smooth color transition
            ambientColor.h += (targetColor.h - ambientColor.h) * 0.02;
            ambientColor.s += (targetColor.s - ambientColor.s) * 0.02;
            ambientColor.l += (targetColor.l - ambientColor.l) * 0.02;
            
            // Clear with fade
            ambientCtx.fillStyle = `rgba(5, 5, 8, 0.1)`;
            ambientCtx.fillRect(0, 0, ambientCanvas.width, ambientCanvas.height);
            
            time += 0.005;
            
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.phase += 0.01;
                
                // Wrap around
                if (p.x < -p.radius) p.x = ambientCanvas.width + p.radius;
                if (p.x > ambientCanvas.width + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = ambientCanvas.height + p.radius;
                if (p.y > ambientCanvas.height + p.radius) p.y = -p.radius;
                
                // Draw glow
                const pulse = Math.sin(p.phase + time * (i % 3 + 1)) * 0.3 + 0.7;
                const gradient = ambientCtx.createRadialGradient(
                    p.x, p.y, 0,
                    p.x, p.y, p.radius * pulse
                );
                
                const { h, s, l } = ambientColor;
                gradient.addColorStop(0, `hsla(${h}, ${s}%, ${l}%, 0.08)`);
                gradient.addColorStop(0.5, `hsla(${h}, ${s}%, ${l - 10}%, 0.04)`);
                gradient.addColorStop(1, 'transparent');
                
                ambientCtx.fillStyle = gradient;
                ambientCtx.beginPath();
                ambientCtx.arc(p.x, p.y, p.radius * pulse, 0, Math.PI * 2);
                ambientCtx.fill();
            });
            
            requestAnimationFrame(animateAmbient);
        }
        
        // Visualizer Canvas
        const visCanvas = document.getElementById('visualizer-canvas');
        const visCtx = visCanvas.getContext('2d');
        
        function resizeVisualizer() {
            visCanvas.width = window.innerWidth;
            visCanvas.height = window.innerHeight * 0.4;
        }
        
        // Event Listeners
        playBtn.addEventListener('click', () => {
            initAudioContext();
            togglePlay();
        });
        
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('loadedmetadata', updateProgress);
        
        progressContainer.addEventListener('click', seek);
        
        loopToggle.addEventListener('click', () => {
            isLooping = !isLooping;
            loopToggle.classList.toggle('active', isLooping);
            loopIndicator.classList.toggle('active', isLooping);
        });
        
        document.getElementById('visuals-toggle').addEventListener('click', function() {
            this.classList.toggle('active');
            const active = this.classList.contains('active');
            ambientCanvas.style.opacity = active ? '0.6' : '0';
            visCanvas.style.opacity = active ? '0.3' : '0';
        });
        
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        
        window.addEventListener('resize', () => {
            resizeAmbient();
            resizeVisualizer();
            initParticles();
        });
        
        // Initialize
        resizeAmbient();
        resizeVisualizer();
        initParticles();
        generateTracklist();
        generateEnergyBars();
        audio.volume = 0.8;
        
        // Start ambient animation immediately
        animateAmbient();
    </script>
</body>
</html>
