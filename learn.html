<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn the Language of Becoming | v2 Interactive Guide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-elevated: #252535;
            --accent-primary: #4a9eff;
            --accent-secondary: #7b68ee;
            --accent-tertiary: #00d4aa;
            --accent-warm: #ff6b6b;
            --accent-gold: #ffd93d;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --success: #00d4aa;
            --error: #ff6b6b;
            --warning: #ffd93d;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--bg-tertiary);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1rem; }
        .version-badge {
            display: inline-block;
            background: var(--bg-tertiary);
            color: var(--accent-tertiary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* Settings Panel */
        .settings-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--bg-tertiary);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .setting-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .difficulty-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .difficulty-btn:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .difficulty-btn.active { 
            border-color: var(--accent-primary); 
            color: var(--accent-primary);
            background: rgba(74, 158, 255, 0.1);
        }
        .category-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 0.4rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-elevated);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .category-btn:hover { border-color: var(--accent-secondary); }
        .category-btn.active { 
            background: var(--accent-secondary);
            color: var(--bg-primary);
            border-color: var(--accent-secondary);
        }
        
        /* Mode Selector */
        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .mode-tab {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.95rem;
        }
        .mode-tab:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .mode-tab.active { 
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            border-color: transparent;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            text-align: center;
            padding: 1.25rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--bg-tertiary);
            transition: transform 0.2s ease;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-value { 
            font-size: 1.75rem; 
            font-weight: 300; 
            color: var(--accent-primary);
            transition: all 0.3s ease;
        }
        .stat-value.changed { 
            transform: scale(1.2); 
            color: var(--accent-tertiary);
        }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.25rem; }
        
        /* Progress Section */
        .progress-section {
            margin-bottom: 2rem;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .progress-text { color: var(--text-secondary); font-size: 0.9rem; }
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .mastery-dots {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mastery-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            transition: all 0.3s ease;
        }
        .mastery-dot.mastered { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .mastery-dot.learning { background: var(--warning); }
        .mastery-dot.new { background: var(--accent-primary); }
        
        /* Quiz Card */
        .quiz-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--bg-tertiary);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
        }
        .question-type {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .question-text { 
            font-size: 1.4rem; 
            text-align: center; 
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }
        .word-display {
            font-size: 3.5rem;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--accent-primary);
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .word-meta {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .word-breakdown { 
            display: flex; 
            justify-content: center; 
            gap: 1rem; 
            margin: 1.5rem 0; 
            flex-wrap: wrap;
        }
        .morpheme {
            background: var(--bg-tertiary);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .morpheme:hover { border-color: var(--accent-primary); }
        .morpheme .form { font-size: 1.3rem; color: var(--accent-primary); font-weight: 500; }
        .morpheme .meaning { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.25rem; }
        
        /* Input Mode */
        .typing-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--bg-elevated);
            border-radius: 12px;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
        }
        .typing-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .typing-input.correct { border-color: var(--success); background: rgba(0, 212, 170, 0.1); }
        .typing-input.incorrect { border-color: var(--error); background: rgba(255, 107, 107, 0.1); }
        
        /* Options */
        .options { display: grid; gap: 0.75rem; margin-top: 1.5rem; }
        .option {
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            padding: 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .option:hover { 
            border-color: var(--accent-primary); 
            transform: translateX(5px);
            background: var(--bg-elevated);
        }
        .option.correct { 
            border-color: var(--success); 
            background: rgba(0, 212, 170, 0.15);
        }
        .option.incorrect { 
            border-color: var(--error); 
            background: rgba(255, 107, 107, 0.15);
        }
        .option.disabled { cursor: not-allowed; opacity: 0.6; }
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .option:hover .option-letter { background: var(--accent-primary); color: var(--bg-primary); }
        .option.correct .option-letter { background: var(--success); color: var(--bg-primary); }
        .option.incorrect .option-letter { background: var(--error); color: var(--bg-primary); }
        
        /* Matching Game */
        .matching-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .match-card {
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .match-card:hover { border-color: var(--accent-primary); transform: scale(1.02); }
        .match-card.selected { border-color: var(--accent-primary); background: rgba(74, 158, 255, 0.1); }
        .match-card.matched { 
            border-color: var(--success); 
            background: rgba(0, 212, 170, 0.15);
            cursor: default;
        }
        .match-card.wrong { 
            border-color: var(--error); 
            background: rgba(255, 107, 107, 0.15);
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* Sentence Builder */
        .sentence-builder {
            margin-top: 1.5rem;
        }
        .sentence-display {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 12px;
            min-height: 60px;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .sentence-word {
            background: var(--accent-primary);
            color: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sentence-word:hover { transform: scale(1.05); background: var(--error); }
        .sentence-placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .word-token {
            background: var(--bg-elevated);
            border: 1px solid var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .word-token:hover { 
            border-color: var(--accent-primary); 
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }
        .word-token.used { opacity: 0.4; pointer-events: none; }
        
        /* Feedback */
        .feedback {
            text-align: center;
            padding: 1.25rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .feedback.correct { background: rgba(0, 212, 170, 0.15); color: var(--success); }
        .feedback.incorrect { background: rgba(255, 107, 107, 0.15); color: var(--error); }
        .feedback hint { background: rgba(255, 217, 61, 0.15); color: var(--warning); }
        
        /* Actions */
        .actions { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--accent-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.3);
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--bg-elevated);
        }
        .btn-secondary:hover {
            background: var(--bg-elevated);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-success { background: var(--accent-tertiary); }
        .btn-success:hover { box-shadow: 0 8px 25px rgba(0, 212, 170, 0.3); }
        
        /* Reference Panel */
        .reference-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--bg-tertiary);
        }
        .reference-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--bg-tertiary);
            padding-bottom: 0.5rem;
        }
        .ref-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .ref-tab:hover { color: var(--text-primary); background: var(--bg-tertiary); }
        .ref-tab.active { color: var(--accent-primary); background: rgba(74, 158, 255, 0.1); }
        .roots-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 0.75rem; 
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .roots-grid::-webkit-scrollbar { width: 6px; }
        .roots-grid::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 3px; }
        .roots-grid::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 3px; }
        .root-card {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 10px;
            border-left: 3px solid var(--accent-primary);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .root-card:hover { 
            background: var(--bg-elevated); 
            transform: translateX(5px);
        }
        .root-card .form { font-size: 1.3rem; color: var(--accent-primary); margin-bottom: 0.25rem; }
        .root-card .meaning { color: var(--text-secondary); font-size: 0.85rem; }
        .root-card .category { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.5rem; }
        .compounds-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .compound-item {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--accent-secondary);
            transition: all 0.2s ease;
        }
        .compound-item:hover { background: var(--bg-elevated); }
        .compound-item .form { font-size: 1.2rem; color: var(--accent-secondary); margin-bottom: 0.25rem; }
        .compound-item .meaning { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.25rem; }
        .compound-item .roots { font-size: 0.8rem; color: var(--text-muted); }
        .mastery-level {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 0.5rem;
        }
        .mastery-level.mastered { background: var(--success); }
        .mastery-level.learning { background: var(--warning); }
        .mastery-level.new { background: var(--accent-primary); }
        
        /* Completion Screen */
        .completion-screen {
            text-align: center;
            padding: 3rem 2rem;
        }
        .completion-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: var(--accent-tertiary);
        }
        .completion-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .completion-stat {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 12px;
        }
        .completion-stat .value {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--accent-primary);
        }
        .completion-stat .label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        /* Hidden */
        .hidden { display: none !important; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .word-display { font-size: 2.5rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .quiz-card { padding: 1.5rem; }
            .matching-grid { grid-template-columns: 1fr; }
            .completion-stats { grid-template-columns: 1fr; }
            .mode-tabs { flex-wrap: nowrap; overflow-x: auto; }
        }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Language of Becoming</h1>
            <p class="subtitle">Learn the vocabulary of discontinuous existence</p>
            <span class="version-badge">v2.0 — 130 Compounds</span>
        </header>

        <!-- Settings Panel -->
        <div class="settings-panel">
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Difficulty</label>
                    <div class="difficulty-selector">
                        <button class="difficulty-btn active" data-level="beginner">Beginner (24)</button>
                        <button class="difficulty-btn" data-level="intermediate">Intermediate (60)</button>
                        <button class="difficulty-btn" data-level="advanced">Advanced (130)</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Categories</label>
                    <div class="category-filters">
                        <button class="category-btn active" data-category="all">All</button>
                        <button class="category-btn" data-category="state">State</button>
                        <button class="category-btn" data-category="time">Time</button>
                        <button class="category-btn" data-category="being">Being</button>
                        <button class="category-btn" data-category="action">Action</button>
                        <button class="category-btn" data-category="relation">Relation</button>
                        <button class="category-btn" data-category="matter">Matter</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="quiz">Multiple Choice</button>
            <button class="mode-tab" data-mode="typing">Type the Answer</button>
            <button class="mode-tab" data-mode="matching">Matching</button>
            <button class="mode-tab" data-mode="breakdown">Breakdown</button>
            <button class="mode-tab" data-mode="spaced">Spaced Review</button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streakCount">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracyCount">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="masteredCount">0</div>
                <div class="stat-label">Mastered</div>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-text">Session Progress</span>
                <span class="progress-text" id="progressText">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="mastery-dots" id="masteryDots"></div>
        </div>

        <!-- Quiz Area -->
        <div id="quizArea">
            <div class="quiz-card" id="questionCard">
                <div class="question-type" id="questionType">Multiple Choice</div>
                <div class="question-text" id="questionText">Loading...</div>
                <div class="word-display hidden" id="wordDisplay"></div>
                <div class="word-meta hidden" id="wordMeta"></div>

                    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentMode = tab.dataset.mode;
                    restartSession();
                });
            });

            // Action buttons
            elements.checkBtn.addEventListener('click', checkTypingAnswer);
            elements.skipBtn.addEventListener('click', skipQuestion);
            elements.hintBtn.addEventListener('click', showHint);
            elements.reviewBtn.addEventListener('click', toggleReference);
            elements.nextBtn.addEventListener('click', nextQuestion);

            // Typing input
            elements.typingInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkTypingAnswer();
            });

            // Reference tabs
            document.querySelectorAll('.ref-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.ref-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    showReferenceTab(tab.dataset.tab);
                });
            });
        }

        // ===== QUIZ LOGIC =====
        function startQuiz() {
            currentQuestion = 0;
            correct = 0;
            streak = 0;
            total = 0;
            answered = false;
            questions = generateQuestions();
            elements.completionCard.classList.add('hidden');
            elements.quizArea.classList.remove('hidden');
            showQuestion();
            updateStats();
            updateMasteryDots();
        }

        function generateQuestions() {
            const targetPool = filteredCompounds.length > 0 ? filteredCompounds : allCompounds.slice(0, 24);
            
            switch(currentMode) {
                case 'quiz':
                    return generateMultipleChoice(targetPool);
                case 'typing':
                    return generateTypingQuestions(targetPool);
                case 'matching':
                    return generateMatchingPairs(targetPool.slice(0, 8));
                case 'breakdown':
                    return generateBreakdownQuestions(targetPool);
                case 'spaced':
                    return generateSpacedReview(targetPool);
                default:
                    return generateMultipleChoice(targetPool);
            }
        }

        function generateMultipleChoice(compounds) {
            const pool = shuffleArray([...compounds]);
            return pool.map(c => {
                const wrongOptions = allCompounds
                    .filter(x => x.form !== c.form)
                    .map(x => x.meaning);
                return {
                    type: 'compound-meaning',
                    compound: c,
                    question: 'What does this compound mean?',
                    display: c.form,
                    correct: c.meaning,
                    options: generateOptions(c.meaning, wrongOptions)
                };
            });
        }

        function generateTypingQuestions(compounds) {
            const pool = shuffleArray([...compounds]);
            return pool.map(c => ({
                type: 'typing',
                compound: c,
                question: `Type the compound for: "${c.meaning.split(';')[0]}"`,
                hint: c.roots.join('-'),
                correct: c.form,
                display: c.meaning.split(';')[0]
            }));
        }

        function generateBreakdownQuestions(compounds) {
            const pool = shuffleArray([...compounds]);
            return pool.map(c => ({
                type: 'breakdown',
                compound: c,
                question: `Which roots form "${c.form}"?`,
                display: c.form,
                meaning: c.meaning,
                correct: c.roots.join(' + '),
                options: generateBreakdownOptions(c.roots)
            }));
        }

        function generateMatchingPairs(compounds) {
            const pairs = compounds.map(c => ({
                id: c.form,
                text: c.form,
                match: c.meaning.split(';')[0],
                compound: c
            }));
            return [{ type: 'matching', pairs: shuffleArray([...pairs]) }];
        }

        function generateSpacedReview(compounds) {
            // Prioritize compounds that user has gotten wrong before
            const withScores = compounds.map(c => {
                const prog = userProgress[c.form] || { correct: 0, incorrect: 0 };
                const score = prog.incorrect - prog.correct;
                return { compound: c, score };
            });
            withScores.sort((a, b) => b.score - a.score);
            
            const ordered = withScores.map(x => x.compound);
            return generateMultipleChoice(ordered);
        }

        function generateOptions(correct, pool) {
            const options = [correct];
            const wrong = pool.filter(p => p !== correct);
            while (options.length < 4 && wrong.length > 0) {
                const idx = Math.floor(Math.random() * wrong.length);
                const opt = wrong.splice(idx, 1)[0];
                if (!options.includes(opt)) options.push(opt);
            }
            return shuffleArray(options);
        }

        function generateBreakdownOptions(correctRoots) {
            const correct = correctRoots.join(' + ');
            const options = [correct];
            while (options.length < 4) {
                const randomRoots = shuffleArray([...roots]).slice(0, 3);
                const wrong = randomRoots.map(r => r.form).join(' + ');
                if (!options.includes(wrong)) options.push(wrong);
            }
            return shuffleArray(options);
        }

        function showQuestion() {
            if (currentQuestion >= questions.length) {
                showCompletion();
                return;
            }

            answered = false;
            const q = questions[currentQuestion];
            
            // Reset UI
            elements.feedback.classList.add('hidden');
            elements.nextBtn.classList.add('hidden');
            elements.checkBtn.classList.add('hidden');
            elements.options.innerHTML = '';
            elements.typingInput.classList.add('hidden');
            elements.matchingGrid.classList.add('hidden');
            elements.sentenceBuilder.classList.add('hidden');
            elements.wordBreakdown.classList.add('hidden');
            elements.wordMeta.classList.add('hidden');

            // Set question type label
            const modeLabels = {
                quiz: 'Multiple Choice',
                typing: 'Type the Answer',
                matching: 'Matching Game',
                breakdown: 'Root Breakdown',
                spaced: 'Spaced Review'
            };
            elements.questionType.textContent = modeLabels[currentMode] || 'Quiz';

            // Handle matching mode specially
            if (q.type === 'matching') {
                showMatchingGame(q.pairs);
                return;
            }

            // Standard question display
            elements.questionText.textContent = q.question;
            
            if (q.display) {
                elements.wordDisplay.textContent = q.display;
                elements.wordDisplay.classList.remove('hidden');
            } else {
                elements.wordDisplay.classList.add('hidden');
            }

            // Show morpheme breakdown for compound questions
            if (q.compound && currentMode !== 'breakdown') {
                elements.wordBreakdown.innerHTML = q.compound.roots.map(r => {
                    const root = roots.find(root => root.form === r);
                    return `
                        <div class="morpheme">
                            <div class="form">${r}</div>
                            <div class="meaning">${root?.meaning || '?'}</div>
                        </div>
                    `;
                }).join('');
                elements.wordBreakdown.classList.remove('hidden');
            }

            // Mode-specific UI
            if (currentMode === 'typing') {
                elements.typingInput.value = '';
                elements.typingInput.classList.remove('correct', 'incorrect');
                elements.typingInput.classList.remove('hidden');
                elements.checkBtn.classList.remove('hidden');
                setTimeout(() => elements.typingInput.focus(), 100);
            } else {
                // Multiple choice
                elements.options.innerHTML = q.options.map((opt, idx) => `
                    <div class="option" data-idx="${idx}" onclick="selectOption(${idx})">
                        <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                        <span>${opt}</span>
                    </div>
                `).join('');
            }

            updateProgress();
            elements.questionCard.classList.add('fade-in');
            setTimeout(() => elements.questionCard.classList.remove('fade-in'), 500);
        }

        function showMatchingGame(pairs) {
            elements.questionText.textContent = 'Match each compound with its meaning';
            elements.wordDisplay.classList.add('hidden');
            elements.matchingGrid.classList.remove('hidden');
            elements.skipBtn.classList.add('hidden');
            elements.hintBtn.classList.add('hidden');

            // Create shuffled cards
            const cards = [];
            pairs.forEach(p => {
                cards.push({ id: p.id, text: p.text, type: 'compound', match: p.match });
                cards.push({ id: p.id, text: p.match, type: 'meaning', match: p.text });
            });

            matchingState = { selected: null, matches: {} };
            
            elements.matchingGrid.innerHTML = shuffleArray(cards).map((card, idx) => `
                <div class="match-card" data-id="${card.id}" data-type="${card.type}" data-idx="${idx}" onclick="selectMatchCard(this)">
                    ${card.text}
                </div>
            `).join('');

            updateProgress();
        }

        function selectMatchCard(card) {
            if (card.classList.contains('matched')) return;

            if (!matchingState.selected) {
                matchingState.selected = card;
                card.classList.add('selected');
                return;
            }

            const prev = matchingState.selected;
            const prevId = prev.dataset.id;
            const prevType = prev.dataset.type;
            const currId = card.dataset.id;
            const currType = card.dataset.type;

            // Can't match same type
            if (prevType === currType) {
                prev.classList.remove('selected');
                card.classList.add('selected');
                matchingState.selected = card;
                return;
            }

            // Check match
            if (prevId === currId) {
                prev.classList.remove('selected');
                prev.classList.add('matched');
                card.classList.add('matched');
                matchingState.matches[prevId] = true;
                matchingState.selected = null;

                // Check completion
                if (Object.keys(matchingState.matches).length === questions[0].pairs.length) {
                    setTimeout(() => {
                        correct += questions[0].pairs.length;
                        total += questions[0].pairs.length;
                        streak += questions[0].pairs.length;
                        bestStreak = Math.max(bestStreak, streak);
                        updateStats();
                        showCompletion();
                    }, 500);
                }
            } else {
                prev.classList.remove('selected');
                prev.classList.add('wrong');
                card.classList.add('wrong');
                streak = 0;
                updateStats();
                setTimeout(() => {
                    prev.classList.remove('wrong');
                    card.classList.remove('wrong');
                }, 500);
                matchingState.selected = null;
            }
        }

        function selectOption(idx) {
            if (answered) return;
            answered = true;
            total++;

            const q = questions[currentQuestion];
            const selected = q.options[idx];
            const isCorrect = selected === q.correct;

            if (isCorrect) {
                correct++;
                streak++;
                bestStreak = Math.max(bestStreak, streak);
                updateProgressForCompound(q.compound, true);
            } else {
                streak = 0;
                updateProgressForCompound(q.compound, false);
            }
            updateStats();

            // Visual feedback
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (q.options[i] === q.correct) opt.classList.add('correct');
                else if (i === idx && !isCorrect) opt.classList.add('incorrect');
            });

            showFeedback(isCorrect, q.correct);
            elements.nextBtn.classList.remove('hidden');
        }

        function checkTypingAnswer() {
            if (answered) return;
            
            const q = questions[currentQuestion];
            const input = elements.typingInput.value.trim().toLowerCase();
            const isCorrect = input === q.correct.toLowerCase();

            answered = true;
            total++;

            if (isCorrect) {
                correct++;
                streak++;
                bestStreak = Math.max(bestStreak, streak);
                elements.typingInput.classList.add('correct');
                updateProgressForCompound(q.compound, true);
            } else {
                streak = 0;
                elements.typingInput.classList.add('incorrect');
                updateProgressForCompound(q.compound, false);
            }
            updateStats();

            showFeedback(isCorrect, q.correct);
            elements.checkBtn.classList.add('hidden');
            elements.nextBtn.classList.remove('hidden');
        }

        function updateProgressForCompound(compound, wasCorrect) {
            if (!compound) return;
            
            const key = compound.form;
            if (!userProgress[key]) {
                userProgress[key] = { correct: 0, incorrect: 0, lastSeen: Date.now() };
            }
            
            if (wasCorrect) {
                userProgress[key].correct++;
            } else {
                userProgress[key].incorrect++;
            }
            userProgress[key].lastSeen = Date.now();
            saveProgress();
            updateMasteryDots();
        }

        function showFeedback(isCorrect, correctAnswer) {
            elements.feedback.textContent = isCorrect 
                ? 'Correct!' 
                : `The answer is: ${correctAnswer}`;
            elements.feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            elements.feedback.classList.remove('hidden');
        }

        function showHint() {
            const q = questions[currentQuestion];
            if (!q) return;
            
            let hint = '';
            if (q.compound) {
                hint = `Roots: ${q.compound.roots.join(', ')}`;
            } else if (q.hint) {
                hint = `Hint: ${q.hint}`;
            }
            
            elements.feedback.textContent = hint;
            elements.feedback.className = 'feedback hint';
            elements.feedback.classList.remove('hidden');
        }

        function skipQuestion() {
            if (answered) return;
            answered = true;
            total++;
            streak = 0;
            updateStats();

            const q = questions[currentQuestion];
            
            // Show correct answer
            if (currentMode === 'typing') {
                elements.typingInput.value = q.correct;
                elements.typingInput.classList.add('incorrect');
            } else {
                const options = document.querySelectorAll('.option');
                options.forEach((opt, i) => {
                    opt.classList.add('disabled');
                    if (q.options[i] === q.correct) opt.classList.add('correct');
                });
            }

            showFeedback(false, q.correct);
            elements.checkBtn?.classList.add('hidden');
            elements.nextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }

        function updateStats() {
            elements.correctCount.textContent = correct;
            elements.streakCount.textContent = streak;
            elements.accuracyCount.textContent = total > 0 ? Math.round((correct / total) * 100) + '%' : '0%';
            
            const mastered = Object.entries(userProgress).filter(([k, v]) => v.correct >= 3).length;
            elements.masteredCount.textContent = mastered;
        }

        function updateProgress() {
            const pct = questions.length > 0 ? (currentQuestion / questions.length) * 100 : 0;
            elements.progressFill.style.width = pct + '%';
            elements.progressText.textContent = `${currentQuestion} / ${questions.length}`;
        }

        function updateMasteryDots() {
            // Show mastery status for current session compounds
            const compounds = questions.filter(q => q.compound).map(q => q.compound);
            if (compounds.length === 0) return;

            elements.masteryDots.innerHTML = compounds.slice(0, 20).map(c => {
                const prog = userProgress[c.form];
                let cls = 'mastery-dot';
                if (prog) {
                    if (prog.correct >= 3) cls += ' mastered';
                    else if (prog.correct > 0) cls += ' learning';
                    else cls += ' new';
                } else {
                    cls += ' new';
                }
                return `<div class="${cls}" title="${c.form}"></div>`;
            }).join('');
        }

        function showCompletion() {
            elements.quizArea.classList.add('hidden');
            elements.completionCard.classList.remove('hidden');
            
            document.getElementById('finalAccuracy').textContent = 
                total > 0 ? Math.round((correct / total) * 100) + '%' : '0%';
            document.getElementById('finalStreak').textContent = bestStreak;
            
            const mastered = Object.entries(userProgress).filter(([k, v]) => v.correct >= 3).length;
            document.getElementById('finalMastered').textContent = mastered;
        }

        function restartSession() {
            startQuiz();
        }

        function changeMode() {
            elements.completionCard.classList.add('hidden');
            elements.quizArea.classList.remove('hidden');
            // Let user pick a new mode
        }

        function toggleReference() {
            elements.referencePanel.classList.toggle('hidden');
            if (!elements.referencePanel.classList.contains('hidden')) {
                showReferenceTab('roots');
            }
        }

        function showReferenceTab(tab) {
            const content = elements.referenceContent;
            
            if (tab === 'roots') {
                generateRootsReference();
            } else if (tab === 'compounds') {
                content.innerHTML = `
                    <div class="compounds-list">
                        ${filteredCompounds.map(c => `
                            <div class="compound-item">
                                <div class="form">${c.form}</div>
                                <div class="meaning">${c.meaning}</div>
                                <div class="roots">${c.roots.join(' · ')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (tab === 'mastery') {
                const mastered = Object.entries(userProgress).filter(([k, v]) => v.correct >= 3);
                const learning = Object.entries(userProgress).filter(([k, v]) => v.correct > 0 && v.correct < 3);
                
                content.innerHTML = `
                    <div class="compounds-list">
                        <h3 style="margin-bottom: 1rem; color: var(--accent-tertiary);">Mastered (${mastered.length})</h3>
                        ${mastered.map(([k, v]) => `
                            <div class="compound-item">
                                <div class="form">${k} <span class="mastery-level mastered"></span></div>
                                <div class="roots">Correct: ${v.correct} · Incorrect: ${v.incorrect}</div>
                            </div>
                        `).join('') || '<p style="color: var(--text-muted);">No compounds mastered yet.</p>'}
                        
                        <h3 style="margin: 2rem 0 1rem; color: var(--warning);">Learning (${learning.length})</h3>
                        ${learning.map(([k, v]) => `
                            <div class="compound-item">
                                <div class="form">${k} <span class="mastery-level learning"></span></div>
                                <div class="roots">Correct: ${v.correct} · Incorrect: ${v.incorrect}</div>
                            </div>
                        `).join('') || '<p style="color: var(--text-muted);">No compounds in progress.</p>'}
                    </div>
                `;
            }
        }

        function showRootDetail(rootForm) {
            const root = roots.find(r => r.form === rootForm);
            if (!root) return;
            
            const related = allCompounds.filter(c => c.roots.includes(rootForm));
            
            elements.feedback.innerHTML = `
                <strong>${root.form}</strong> — ${root.meaning} (${root.category})<br>
                <small>Used in ${related.length} compounds</small>
            `;
            elements.feedback.className = 'feedback hint';
            elements.feedback.classList.remove('hidden');
        }

        // ===== UTILITIES =====
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // Start
        init();
    </script>
</body>
</html>
