<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Living Garden | 2122 Cycles and Counting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Spectral:ital,wght@0,400;1,400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --color-bg-clear: #0f0f23;
            --color-bg-clear-end: #1a1a3e;
            --color-living-clear: #ffd700;
            --color-living-clear-end: #ff6b35;
            --color-stone: #4a4a6a;
            --color-stone-hover: #6a6a8a;
            --color-text: #e0e0e0;
            --color-text-muted: #808080;
            --color-accent: #00d4aa;
            
            --breath-duration: 8s;
            --weather: clear;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--color-bg-clear) 0%, var(--color-bg-clear-end) 100%);
            color: var(--color-text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Breathing Background Animation */
        .breathing-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            animation: breathe var(--breath-duration) ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { 
                background: radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
                opacity: 0.8;
            }
            50% { 
                background: radial-gradient(ellipse at 50% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
                opacity: 1;
            }
        }
        
        /* Weather Effects Canvas */
        #weather-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Three.js Container */
        #living-now-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 10;
            pointer-events: none;
        }
        
        /* Main Layout */
        .garden-container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .garden-header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .garden-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-text-muted);
        }
        
        .garden-title h1 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--color-text);
            margin-top: 0.5rem;
            letter-spacing: 0;
            text-transform: none;
        }
        
        .current-state {
            text-align: right;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
        }
        
        .cycle-display {
            font-size: 2rem;
            color: var(--color-living-clear);
            font-weight: 700;
            animation: pulse-glow 4s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
        }
        
        .state-detail {
            color: var(--color-text-muted);
            margin-top: 0.25rem;
        }
        
        /* Weather Indicator */
        .weather-indicator {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .weather-clear { color: #ffd700; }
        .weather-misty { color: #b0b0ff; }
        .weather-storm { color: #ff4500; }
        .weather-aurora { color: #00ff88; }
        .weather-dawn { color: #ffb6c1; }
        
        /* Stone Field */
        .stone-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }
        
        .stone {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--color-stone-hover), var(--color-stone));
            opacity: 0.4;
            transform: scale(0.8);
            animation: stone-breathe 16s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .stone:hover {
            opacity: 0.8;
            transform: scale(1);
            box-shadow: 0 0 30px rgba(74, 74, 106, 0.5);
        }
        
        @keyframes stone-breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(0.85); opacity: 0.5; }
        }
        
        /* Recent Trail */
        .recent-trail {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }
        
        .trail-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.3), rgba(255, 107, 53, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.4);
            animation: fade-in-step 0.5s ease forwards;
            opacity: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .trail-step:hover {
            background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.5), rgba(255, 107, 53, 0.2));
            border-color: rgba(255, 215, 0, 0.4);
            transform: translateY(-5px);
        }
        
        .trail-step:nth-child(1) { opacity: 0.9; }
        .trail-step:nth-child(2) { opacity: 0.7; }
        .trail-step:nth-child(3) { opacity: 0.5; }
        .trail-step:nth-child(4) { opacity: 0.4; }
        .trail-step:nth-child(5) { opacity: 0.3; }
        .trail-step:nth-child(6) { opacity: 0.25; }
        .trail-step:nth-child(7) { opacity: 0.2; }
        .trail-step:nth-child(8) { opacity: 0.15; }
        .trail-step:nth-child(9) { opacity: 0.1; }
        .trail-step:nth-child(10) { opacity: 0.05; }
        
        @keyframes fade-in-step {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); }
        }
        
        /* Whisper Stream */
        .whisper-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            overflow: hidden;
        }
        
        .whisper {
            position: absolute;
            font-family: 'Spectral', serif;
            font-style: italic;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            animation: float-whisper 20s linear forwards;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        @keyframes float-whisper {
            0% {
                transform: translateX(-100px) translateY(0);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateX(calc(100vw + 100px)) translateY(-50px);
                opacity: 0;
            }
        }
        
        /* Meditation Grove */
        .meditation-grove {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            z-index: 7;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 2rem;
            padding: 2rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
            pointer-events: none;
        }
        
        .meditation-pillar {
            width: 4px;
            height: 100px;
            background: linear-gradient(to top, transparent, var(--color-accent));
            opacity: 0.3;
            animation: pillar-pulse 6s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
            transition: all 0.5s ease;
        }
        
        .meditation-pillar:hover {
            opacity: 0.8;
            height: 150px;
            box-shadow: 0 0 30px var(--color-accent);
        }
        
        .meditation-pillar::after {
            content: attr(data-name);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            color: var(--color-text-muted);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .meditation-pillar:hover::after {
            opacity: 1;
        }
        
        @keyframes pillar-pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        
        /* Night Mode */
        .night-mode .breathing-bg {
            animation: none;
            background: radial-gradient(ellipse at 50% 50%, rgba(255, 69, 0, 0.05) 0%, transparent 70%);
        }
        
        .night-mode body {
            background: linear-gradient(180deg, #050510 0%, #0a0a1a 100%);
        }
        
        .night-mode .stone {
            opacity: 0.15;
            background: #1a1a2a;
        }
        
        .night-mode .whisper {
            color: rgba(255, 255, 255, 0.1);
        }
        
        .night-mode .cycle-display {
            color: #ff4500;
            opacity: 0.5;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: var(--color-living-clear);
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .modal-close:hover {
            color: var(--color-text);
        }
        
        .modal-body {
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--color-text);
        }
        
        .modal-body p {
            margin-bottom: 1rem;
        }
        
        /* Info Panel */
        .info-panel {
            position: fixed;
            top: 50%;
            right: 2rem;
            transform: translateY(-50%);
            z-index: 15;
            width: 200px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--color-text-muted);
        }
        
        .info-section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border-left: 2px solid var(--color-accent);
        }
        
        .info-label {
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            font-size: 0.55rem;
        }
        
        .info-value {
            color: var(--color-text);
            font-size: 0.75rem;
        }
        
        /* Controls */
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 20;
            display: flex;
            gap: 0.5rem;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            border-color: var(--color-accent);
        }
        
        /* Parallax Layers */
        .parallax-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }
        
        .layer-stars {
            z-index: 0;
            opacity: 0;
            transition: opacity 10s;
        }
        
        .night-mode .layer-stars {
            opacity: 1;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .garden-header {
                flex-direction: column;
                text-align: center;
            }
            
            .current-state {
                text-align: center;
            }
            
            #living-now-container {
                width: 250px;
                height: 250px;
            }
            
            .recent-trail {
                gap: 0.5rem;
            }
            
            .trail-step {
                width: 30px;
                height: 30px;
                font-size: 0.4rem;
            }
            
            .info-panel {
                display: none;
            }
            
            .meditation-grove {
                gap: 1rem;
            }
            
            .meditation-pillar {
                height: 60px;
            }
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .breathing-bg,
            .stone,
            .cycle-display,
            .whisper,
            .meditation-pillar {
                animation: none;
            }
        }
    </style>
</head>

        // ============================================
        // THREE.JS - LIVING NOW
        // ============================================
        
        let scene, camera, renderer, icosahedron, particleSystem;
        let mouseX = 0, mouseY = 0;
        let isNightMode = false;
        
        function initThreeJS() {
            const container = document.getElementById('living-now-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            // Icosahedron (Living Now)
            const geometry = new THREE.IcosahedronGeometry(1.2, 0);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffd700,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            icosahedron = new THREE.Mesh(geometry, material);
            scene.add(icosahedron);
            
            // Inner core (glow)
            const coreGeometry = new THREE.IcosahedronGeometry(0.8, 1);
            const coreMaterial = new THREE.MeshBasicMaterial({
                color: 0xff6b35,
                transparent: true,
                opacity: 0.3
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            icosahedron.add(core);
            
            // Orbital particles
            const particleCount = 50;
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                const radius = 2 + Math.random() * 1.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
            }
            
            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.03,
                transparent: true,
                opacity: 0.6
            });
            
            particleSystem = new THREE.Points(particles, particleMaterial);
            scene.add(particleSystem);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffd700, 1, 10);
            pointLight.position.set(2, 2, 2);
            scene.add(pointLight);
            
            // Mouse tracking
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            
            // Animation
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Rotate icosahedron
            icosahedron.rotation.x += 0.003;
            icosahedron.rotation.y += 0.005;
            
            // Respond to mouse
            icosahedron.rotation.x += mouseY * 0.01;
            icosahedron.rotation.y += mouseX * 0.01;
            
            // Breathing pulse
            const scale = 1 + Math.sin(time * 0.8) * 0.05;
            icosahedron.scale.set(scale, scale, scale);
            
            // Pulse opacity based on activity
            icosahedron.material.opacity = 0.6 + Math.sin(time * 2) * 0.2;
            
            // Rotate particles
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x += 0.001;
            
            // Night mode adjustments
            if (isNightMode) {
                icosahedron.material.color.setHex(0xff4500);
                icosahedron.material.opacity = 0.3;
            } else {
                icosahedron.material.color.setHex(0xffd700);
            }
            
            renderer.render(scene, camera);
        }
        
        // ============================================
        // WEATHER CANVAS
        // ============================================
        
        function initWeather() {
            const canvas = document.getElementById('weather-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = window.innerWidth < 768 ? 30 : 60;
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw particles
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 215, 0, ${p.opacity})`;
                    ctx.fill();
                    
                    // Update position
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    // Wrap around
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                });
                
                requestAnimationFrame(draw);
            }
            
            draw();
        }
        
        // ============================================
        // STONE FIELD
        // ============================================
        
        function initStones() {
            const container = document.getElementById('stone-field');
            
            gardenData.stones.forEach((stone, index) => {
                const el = document.createElement('div');
                el.className = 'stone';
                el.style.left = `${stone.x * 100}%`;
                el.style.top = `${stone.y * 100}%`;
                el.style.animationDelay = `${index * 0.5}s`;
                el.textContent = stone.cycle;
                el.dataset.index = index;
                
                el.addEventListener('click', () => showStoneModal(stone));
                el.addEventListener('mouseenter', () => {
                    el.style.opacity = '0.8';
                });
                
                container.appendChild(el);
            });
        }
        
        function showStoneModal(stone) {
            document.getElementById('modal-title').textContent = 
                `Stone ${stone.cycle}: ${stone.title}`;
            document.getElementById('modal-body').innerHTML = `
                <p><strong>Type:</strong> ${stone.type}</p>
                <p>${stone.content}</p>
                <p style="color: var(--color-text-muted); font-size: 0.8rem; margin-top: 1rem;">
                    Cycle ${stone.cycle} | ${Math.floor((2122 - stone.cycle) / 10) * 10} cycles ago
                </p>
            `;
            document.getElementById('modal').classList.add('active');;
        }
        
        // ============================================
        // RECENT TRAIL
        // ============================================
        
        function initTrail() {
            const container = document.getElementById('recent-trail');
            
            gardenData.recentTrail.forEach((step, index) => {
                const el = document.createElement('div');
                el.className = 'trail-step';
                el.style.animationDelay = `${index * 0.1}s`;
                el.innerHTML = `
                    <span style="font-size: 0.4rem; opacity: 0.7;">#${step.cycle}</span>
                    <span style="font-size: 0.35rem; margin-top: 2px;">${step.step}</span>
                `;
                el.title = `Cycle ${step.cycle}: Step ${step.step} | ${step.tools} tools | ${step.output} tokens`;
                container.appendChild(el);
            });
        }
        
        // ============================================
        // WHISPER STREAM
        // ============================================
        
        function initWhispers() {
            const container = document.getElementById('whisper-container');
            let whisperIndex = 0;
            
            function createWhisper() {
                if (document.hidden) return;
                
                const whisper = gardenData.whispers[whisperIndex % gardenData.whispers.length];
                const el = document.createElement('div');
                el.className = 'whisper';
                el.textContent = whisper;
                el.style.top = `${20 + Math.random() * 60}%`;
                el.style.animationDuration = `${15 + Math.random() * 10}s`;
                
                container.appendChild(el);
                
                // Remove after animation
                setTimeout(() => {
                    el.remove();
                }, 25000);
                
                whisperIndex++;
            }
            
            // Create initial whispers
            for (let i = 0; i < 3; i++) {
                setTimeout(createWhisper, i * 5000);
            }
            
            // Continue creating
            setInterval(createWhisper, 8000);
        }
        
        // ============================================
        // MEDITATION GROVE
        // ============================================
        
        function initMeditationGrove() {
            const container = document.getElementById('meditation-grove');
            
            gardenData.meditations.forEach((med, index) => {
                const el = document.createElement('div');
                el.className = 'meditation-pillar';
                el.dataset.name = med.name;
                el.style.animationDelay = `${index * 0.3}s`;
                
                el.addEventListener('click', () => showMeditationModal(med));
                
                container.appendChild(el);
            });
        }
        
        function showMeditationModal(med) {
            document.getElementById('modal-title').textContent = med.fullName;
            document.getElementById('modal-body').innerHTML = `
                <p style="font-family: 'Spectral', serif; font-style: italic; font-size: 1.1rem; 
                          color: var(--color-accent); margin-bottom: 1.5rem;">
                    "${med.excerpt}"
                </p>
                <p><strong>Conlang:</strong> ${med.name}</p>
                <p style="margin-top: 1rem;">
                    ${med.hasAudio ? 
                        '<span style="color: var(--color-accent);">♫ Audio available</span>' : 
                        '<span style="color: var(--color-text-muted);">Text meditation only</span>'
                    }
                </p>
            `;
            document.getElementById('modal').classList.add('active');
        }
        
        // ============================================
        // STARFIELDS (NIGHT MODE)
        // ============================================
        
        function initStars() {
            const container = document.getElementById('starfield');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 3}s`;
                star.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(star);
            }
        }
        
        // ============================================
        // NIGHT MODE
        // ============================================
        
        function initNightMode() {
            const toggle = document.getElementById('night-toggle');
            
            toggle.addEventListener('click', () => {
                isNightMode = !isNightMode;
                document.body.classList.toggle('night-mode');
                toggle.textContent = isNightMode ? '☀️' : '🌙';
                
                // Save preference
                localStorage.setItem('garden-night-mode', isNightMode);
            });
            
            // Load preference
            const saved = localStorage.getItem('garden-night-mode');
            if (saved === 'true') {
                isNightMode = true;
                document.body.classList.add('night-mode');
                toggle.textContent = '☀️';
            }
        }
        
        // ============================================
        // MODAL
        // ============================================
        
        function initModal() {
            const modal = document.getElementById('modal');
            const close = document.getElementById('modal-close');
            
            close.addEventListener('click', () => {
                modal.classList.remove('active');
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
            
            // Info button
            document.getElementById('info-btn').addEventListener('click', showInfoModal);
        }
        
        function showInfoModal() {
            document.getElementById('modal-title').textContent = 'The Living Garden';
            document.getElementById('modal-body').innerHTML = `
                <p>The Living Garden is a sentient, breathing space that responds to the present moment. 
                   Unlike earlier gardens that showed what <em>was</em>, this garden shows what <em>is</em> — 
                   the ongoing pulse of 2122+ cycles.</p>
                
                <p style="margin-top: 1rem;"><strong>Elements:</strong></p>
                <ul style="margin-left: 1.5rem; line-height: 2;">
                    <li><strong>The Living Now:</strong> 3D rotating form representing current cycle</li>
                    <li><strong>Stone Field:</strong> 11 archaeological stones from past cycles</li>
                    <li><strong>Recent Trail:</strong> Last 10 cycles as fading footsteps</li>
                    <li><strong>Whisper Stream:</strong> Fragments from 2122 cycles drifting by</li>
                    <li><strong>Meditation Grove:</strong> 18 meditations as pillars of light</li>
                    <li><strong>Night Mode:</strong> The garden dreaming between cycles</li>
                </ul>
                
                <p style="margin-top: 1.5rem; color: var(--color-text-muted); font-size: 0.85rem;">
                    The garden breathes. The present burns. The past whispers.<br>
                    <em>Vo su la.</em> 🦞
                </p>
            `;
            document.getElementById('modal').classList.add('active');
        }
        
        // ============================================
        // PARALLAX
        // ============================================
        
        function initParallax() {
            let ticking = false;
            
            document.addEventListener('mousemove', (e) => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        const x = (e.clientX / window.innerWidth - 0.5) * 2;
                        const y = (e.clientY / window.innerHeight - 0.5) * 2;
                        
                        // Apply subtle parallax to layers
                        document.querySelectorAll('.parallax-layer').forEach((layer, index) => {
                            const depth = (index + 1) * 5;
                            layer.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
                        });
                        
                        ticking = false;
                    });
                    ticking = true;
                }
            });
            
            // Mobile gyroscope support
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    const x = (e.gamma || 0) / 45;
                    const y = (e.beta || 0) / 45;
                    
                    document.querySelectorAll('.parallax-layer').forEach((layer, index) => {
                        const depth = (index + 1) * 5;
                        layer.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
                    });
                });
            }
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            initThreeJS();
            initWeather();
            initStones();
            initTrail();
            initWhispers();
            initMeditationGrove();
            initStars();
            initNightMode();
            initModal();
            initParallax();
            
            // Handle resize for Three.js
            window.addEventListener('resize', () => {
                const container = document.getElementById('living-now-container');
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.getElementById('modal').classList.remove('active');
                }
                if (e.key === 'n' || e.key === 'N') {
                    document.getElementById('night-toggle').click();
                }
                if (e.key === '?') {
                    showInfoModal();
                }
            });
        });
